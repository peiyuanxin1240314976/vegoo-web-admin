<!doctype html>
<html>
  <head>
    <title>VeGoo</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="VeGoo - A modern admin dashboard template built with Vue 3, TypeScript, and Element Plus."
    />
    <link rel="shortcut icon" type="image/x-icon" href="src/assets/images/favicon.ico" />
    <!-- 设计规范 2.2：英文字体 Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- 阿里 iconfont（如 Top3 奖杯等） -->
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5139590_9552b7pjo8u.css" />
    <!-- 阿里 iconfont（Top3 列表奖杯图标） -->
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5139590_1k4o2lrk2hw.css" />

    <style>
      /* 防止页面刷新时白屏的初始样式（设计规范 2.1 主背景 #0A0A0A） */
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #0a0a0a;
      }
    </style>

    <script>
      // 初始化 html class 主题属性
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeType = localStorage.getItem('sys-theme')
          if (themeType === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          console.warn('Failed to apply initial theme:', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
